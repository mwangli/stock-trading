server:
  port: 8082

spring:
  application:
    name: model-service

  # MongoDB配置 (用于存储模型训练数据)
  data:
    mongodb:
      host: 124.220.36.95
      port: 27017
      database: stock_trading
      authentication-database: admin
      username: admin
      password: Root.123456

# DJL模型配置
djl:
  model:
    dir: ./models
    lstm:
      path: ./models/lstm
    sentiment:
