# AI Shopping 后端配置 (Spring Boot 3.0 + MyBatis-Plus)

# 服务端口
server:
  port: 8080

# Spring 配置
spring:
  application:
    name: ai-shopping-backend
  
  # 数据库配置 (MySQL 8.0)
  datasource:
    url: jdbc:mysql://124.220.36.95:6033/ai-shopping?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Root.123456
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    com.example.aishopping: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    console: UTF-8
    file: UTF-8

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
