server:
  port: 8080

spring:
  application:
    name: stock-trading
  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.220.36.95:6033/stock_trading?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: Root.123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # Redis配置
  data:
    redis:
      host: 124.220.36.95
      port: 6379
      password: Root.123456
      database: 0

    # MongoDB配置
    mongodb:
      host: 124.220.36.95
      port: 27017
      database: stock_trading
      authentication-database: admin
      username: admin
      password: Root.123456

# 模块配置
modules:
  data-collector:
    enabled: true
    scheduling:
      enabled: true
  model-service:
    enabled: true
  strategy-analysis:
    enabled: true
  trading-executor:
    enabled: true

# DJL模型配置
djl:
  model:
    dir: ./models
    lstm:
      path: ./models/lstm
    sentiment:
      path: ./models/sentiment

# 训练配置
training:
  lstm:
    epochs: 100
    batchSize: 32
    learningRate: 0.001
  sentiment:
    epochs: 50
    batchSize: 16
    learningRate: 0.0001

# 策略配置
strategy:
  decision:
    confidence-threshold: 0.7
    max-position-size: 10000
  selector:
    min-volume: 100000
    min-price: 5.0
    max-pe: 100

# 日志配置
logging:
  level:
    root: INFO
    com.stock: DEBUG
    ai.djl: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
