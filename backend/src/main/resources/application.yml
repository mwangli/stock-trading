server:
  port: 8080

spring:
  application:
    name: stock-trading
  main:
    allow-bean-definition-overriding: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.220.36.95:6033/stock_trading?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: Root.123456
  # 如果你使用远程 Redis，只需要修改 host/port/password 即可
  data:
    redis:
      host: 124.220.36.95
      port: 6379
      password: Root.123456
      database: 0

    # MongoDB配置
    mongodb:
      auto-index-creation: true
      host: 124.220.36.95
      port: 27017
      database: stock_trading
      authentication-database: admin
      username: admin
      password: Root.123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# DJL模型配置（Windows 使用 pytorch-native-cu121 时需安装 NVIDIA 驱动 + CUDA 12.1）
djl:
  model:
    dir: ./models
    lstm:
      path: ./models/lstm
    sentiment:
      path: ./models/sentiment

# 训练配置
training:
  lstm:
    epochs: 100
    batchSize: 32
    learningRate: 0.001
  sentiment:
    epochs: 50
    batchSize: 16
    learningRate: 0.0001

# 策略配置
strategy:
  decision:
    confidence-threshold: 0.7
    max-position-size: 10000
  selector:
    min-volume: 100000
    min-price: 5.0
    max-pe: 100
logging:
  level:
    root: INFO
    com.stock: INFO
    ai.djl: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  startup:
    history-sync:
      enabled: false  # 历史数据初始化开关，默认关闭以加快启动速度
    # 模型训练开关：启动后是否自动检查并训练缺失的 LSTM 模型
    model-training:
      enabled: false

