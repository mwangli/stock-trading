server:
  port: 8081

spring:
  application:
    name: data-collector

  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.220.36.95:6033/stock_trading?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: Root.123456

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
          fetch_size: 100
        order_inserts: true
        order_updates: true

  # Redis配置
  data:
    redis:
      host: 124.220.36.95
      port: 6379
      password: Root.123456
      database: 0

    # MongoDB配置
    mongodb:
      host: 124.220.36.95
      port: 27017
      database: stock_trading
      authentication-database: admin
      username: admin
      password: Root.123456

# 日志配置
logging:
  level:
    root: INFO
    com.stock: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 定时任务配置
scheduling:
  enabled: true