version: '3.8'

services:
  # ===================
  # Backend Service（CI 推送至阿里云 ACR，服务器拉取）
  # ===================
  backend:
    # 阿里云镜像：CI 部署时注入 BACKEND_IMAGE；本地开发用 stock-backend:latest
    image: ${BACKEND_IMAGE:stock-backend:latest}
    container_name: stock-backend
    ports:
      - "8080:8080"
    volumes:
      # 统一模型资源数据卷，容器内挂载到 /models
      - models-data:/models
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/stock_trading?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      # Mongo 连接字符串中的密码通过统一环境变量注入
      - SPRING_DATA_MONGODB_URI=mongodb://admin:${GLOBAL_DB_PASSWORD}@mongo:27017/stock_trading?authSource=admin
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${GLOBAL_DB_PASSWORD}
    depends_on:
      - mysql
      - mongo
      - redis
    networks:
      - stock-network
    restart: unless-stopped

  # ===================
  # MySQL Database
  # ===================
  mysql:
    image: mysql:8.0
    container_name: stock-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${GLOBAL_DB_PASSWORD}
      - MYSQL_DATABASE=stock_trading
      - MYSQL_ROOT_HOST=%
    ports:
      # 宿主机 6033 -> 容器 3306，对外暴露 6033
      - "6033:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - stock-network
    restart: unless-stopped
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --bind-address=0.0.0.0

  # ===================
  # MongoDB
  # ===================
  mongo:
    image: mongo:6.0
    container_name: stock-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${GLOBAL_DB_PASSWORD}
      - MONGO_INITDB_DATABASE=stock_trading
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - stock-network
    restart: unless-stopped

  # ===================
  # Redis Cache
  # ===================
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - stock-network
    restart: unless-stopped
    command: redis-server --requirepass ${GLOBAL_DB_PASSWORD} --appendonly yes

networks:
  stock-network:
    driver: bridge

volumes:
  mysql-data:
  mongo-data:
  redis-data:
  # 模型资源持久化卷（LSTM / 情感等模型统一挂载到 /models）
  models-data:
