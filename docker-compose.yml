services:
  # ===================
  # Chrome 直连模式容器 - 支持会话持久化
  # 直接启动 Chrome 并暴露 DevTools 端口，后端通过 CDP 直连
  # ===================
  chrome:
    image: selenium/chrome:latest
    container_name: stock-chrome
    ports:
      - "9222:9222"    # Chrome DevTools 协议端口（CDP 直连）
      - "7900:7900"    # VNC 可视化端口（可选）
    mem_limit: 1500m  # 限制容器最大内存1.5GB（适配4G服务器）
    shm_size: '2gb'
    volumes:
      - chrome-userdata:/home/seluser/chrome-data   # Cookie 持久化
    environment:
      - CHROME_PORT=9222
    networks:
      - stock-network
    restart: unless-stopped
    # 直接启动 Chrome，支持 CDP 和会话持久化
    command: >
      bash -c "
        rm -f /tmp/.X*-lock /home/seluser/chrome-data/SingletonLock 2>/dev/null;
        mkdir -p /home/seluser/chrome-data && chown -R seluser:seluser /home/seluser/chrome-data &&
        su - seluser -c 'google-chrome --headless=new --remote-debugging-port=9222 --user-data-dir=/home/seluser/chrome-data --disable-blink-features=AutomationControlled --no-sandbox --disable-dev-shm-usage --disable-gpu'
      "

  # ===================
  # Backend Service（CI 推送至阿里云 ACR，服务器拉取）
  # ===================
  stock-backend:
    image: registry.cn-shenzhen.aliyuncs.com/mwangli/stock-trading:latest
    container_name: stock-backend
    ports:
      - "8080:8080"
    volumes:
      - models-data:/models
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - GLOBAL_DB_PASSWORD=${GLOBAL_DB_PASSWORD}
      - SPRING_DATASOURCE_URL=jdbc:mysql://stock-mysql:3306/stock_trading?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATA_MONGODB_URI=mongodb://admin:${GLOBAL_DB_PASSWORD}@stock-mongo:27017/stock_trading?authSource=admin
      - SPRING_REDIS_HOST=stock-redis
      - CHROME_MODE=docker
      - CHROME_DEBUG_PORT=9222
      - CHROME_USER_DATA_DIR=/home/seluser/chrome-data
    depends_on:
      - stock-mysql
      - stock-mongo
      - stock-redis
    networks:
      - stock-network
    restart: unless-stopped

  # ===================
  # MySQL Database
  # ===================
  stock-mysql:
    image: mysql:8.0
    container_name: stock-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${GLOBAL_DB_PASSWORD}
      - MYSQL_DATABASE=stock_trading
      - MYSQL_ROOT_HOST=%
    ports:
      - "6033:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - stock-network
    restart: unless-stopped
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --bind-address=0.0.0.0

  # ===================
  # MongoDB
  # ===================
  stock-mongo:
    image: mongo:6.0
    container_name: stock-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${GLOBAL_DB_PASSWORD}
      - MONGO_INITDB_DATABASE=stock_trading
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - stock-network
    restart: unless-stopped

  # ===================
  # Redis Cache
  # ===================
  stock-redis:
    image: redis:7-alpine
    container_name: stock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - stock-network
    restart: unless-stopped
    command: redis-server --requirepass ${GLOBAL_DB_PASSWORD} --appendonly yes

networks:
  stock-network:
    driver: bridge

volumes:
  mysql-data:
  mongo-data:
  redis-data:
  models-data:
  chrome-userdata:
