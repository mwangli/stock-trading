server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: stock-trading

  # 数据源配置 (部署服务器: 124.220.36.95:6033)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.220.36.95:6033/stock_trading?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: Root.123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: StockHikariCP

  # Redis配置 (部署服务器: 124.220.36.95:6379)
  data:
    redis:
      host: 124.220.36.95
      port: 6379
      password: Root.123456
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  # MongoDB配置 (部署服务器: 124.220.36.95:27017)
  data:
    mongodb:
      host: 124.220.36.95
      port: 27017
      database: stock_trading
      authentication-database: admin
      username: admin
      password: Root.123456

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.stock.**.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DJL配置
djl:
  model:
    path: classpath:/models
  training:
    batch-size: 32
    epoch: 100

# 日志配置
logging:
  level:
    root: INFO
    com.stock: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/stock-trading.log
    max-size: 100MB
    max-history: 30
