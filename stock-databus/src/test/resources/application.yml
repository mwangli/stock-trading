spring:
  profiles:
    active: test
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stock_trading_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

  data:
    mongodb:
      host: localhost
      port: 27017
      database: stock_trading_test
      authentication-database: admin

    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
