# 流程：构建 JAR → 推送 ACR → rsync compose → docker compose up
name: Simple CI

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: build-and-push
        run: |
          mvn -B -q clean package -DskipTests
          cp backend/target/stock-trading-backend-*.jar backend/app.jar
          IMAGE=${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/stock-trading:latest
          docker build -q -t $IMAGE -f backend/Dockerfile backend
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin
          for i in 1 2 3; do docker push $IMAGE && break || sleep 15; done
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: rsync-docker-compose
        run: |
          sudo apt-get install -y sshpass
          sshpass -e rsync -az -e "ssh -o StrictHostKeyChecking=no" docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_DEPLOY_DIR }}/
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}

      - name: deploy-and-start
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd ${{ secrets.SERVER_DEPLOY_DIR }}
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            BACKEND_IMAGE=${{ env.IMAGE }} GLOBAL_DB_PASSWORD=${{ secrets.GLOBAL_DB_PASSWORD }} docker compose up -d --pull always backend
