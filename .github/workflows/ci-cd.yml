name: CI/CD

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -ex
            R="${{ github.repository }}"
            D="${{ secrets.SERVER_DEPLOY_DIR }}"
            echo "[CI] Start deploy, repo=${R}, branch=main, dir=${D}"
            mkdir -p "${D}"
            echo "[CI] Dir ready"
            if [ -d "${D}/app/.git" ]; then
              echo "[CI] Existing repo found, update from origin/main"
              cd "${D}/app"
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            else
              echo "[CI] No repo found, cloning fresh"
              git clone "https://github.com/${R}.git" "${D}/app"
              cd "${D}/app"
            fi
            echo "[CI] Git clone/update done"
            git lfs pull
            echo "[CI] Git LFS done"
            mvn -B clean package -DskipTests
            echo "[CI] Maven build done"
            cp backend/target/*.jar backend/
            echo "[CI] Jar copied"
            docker build -t stock-backend:latest ./backend
            echo "[CI] Docker build done"
            [ -f ../.env ] || { echo "Missing ${D}/.env (GLOBAL_DB_PASSWORD)"; exit 1; }
            echo "[CI] .env found"
            docker compose --env-file ../.env -f docker-compose.yml up -d backend
            echo "[CI] Docker compose up done"
            docker image prune -f
            echo "[CI] Docker prune done, deploy finished"
