name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ===============================
  # CI：父项目一次构建
  # ===============================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 可选：仍然保留一次 Maven 构建做基本校验
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build full project (skip tests)
        run: mvn -B clean package -DskipTests

      # 在 GitHub Runner 上构建并推送后端镜像到阿里云 ACR
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}          # 例如 registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPO }}:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPO }}:${{ github.sha }}

  # ===============================
  # CD：SSH 到服务器执行部署
  # ===============================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # 切换到服务器上存放 docker-compose.yml 的目录（无需源码）
            cd ${{ secrets.SERVER_DEPLOY_DIR }}

            # 登录阿里云镜像仓库
            docker login ${{ secrets.ACR_REGISTRY }} \
              -u "${{ secrets.ACR_USERNAME }}" \
              -p "${{ secrets.ACR_PASSWORD }}"

            # 拉取最新后端镜像
            docker pull ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPO }}:latest

            # 使用最新镜像更新后端服务（docker-compose.yml 中 backend 必须使用 image: 字段）
            docker-compose -f docker-compose.yml up -d backend

            # 可选：清理未使用镜像
            docker image prune -f
