name: Simple CI

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # SSH 登录到服务器，在服务器上执行：拉代码 + 构建镜像 + 启动容器
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          # 从 GitHub Secrets 注入到当前步骤的环境变量
          GLOBAL_DB_PASSWORD: ${{ secrets.GLOBAL_DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          # 将环境变量转发到远程服务器
          envs: GLOBAL_DB_PASSWORD
          script: |
            set -ex

            D="${{ secrets.SERVER_DEPLOY_DIR }}"
            echo "[CI] Deploy dir: ${D}"

            # 进入服务器上的项目根目录（假设代码在 ${D}/app 下）
            cd "${D}/app"

            echo "[CI] Git pull latest code"
            git pull origin main

            echo "[CI] Build backend Docker image using root Dockerfile"
            docker build -t stock-backend:latest -f Dockerfile .

            echo "[CI] Start backend container with docker compose (GLOBAL_DB_PASSWORD 来自 GitHub Secrets)"
            docker compose -f docker-compose.yml up -d backend

            echo "[CI] Prune unused images"
            docker image prune -f
