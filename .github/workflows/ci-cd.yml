name: Simple CI

on:
  push:
    branches: ['main']

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: build-backend-jar
        working-directory: backend
        run: |
          mvn -B clean package -DskipTests
          cp target/*.jar app.jar
      - name: upload-files-to-server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "backend/app.jar,backend/Dockerfile,docker-compose.yml"
          target: ${{ secrets.SERVER_DEPLOY_DIR }}/app
          overwrite: true
      - name: deploy-on-server
        uses: appleboy/ssh-action@v1.0.0
        env:
          GLOBAL_DB_PASSWORD: ${{ secrets.GLOBAL_DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          envs: GLOBAL_DB_PASSWORD
          script: |
            set -ex
            D="${{ secrets.SERVER_DEPLOY_DIR }}/app"
            cd "${D}"
            docker build -t stock-backend:latest -f backend/Dockerfile backend
            docker compose -f docker-compose.yml up -d backend
            docker image prune -f
