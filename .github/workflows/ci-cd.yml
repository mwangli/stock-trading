name: CI/CD

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build backend jar
        run: mvn -B clean package -DskipTests
        working-directory: backend

      - name: Copy backend jar to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "backend/target/*.jar"
          target: "${{ secrets.SERVER_DEPLOY_DIR }}/app/backend"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -ex
            D="${{ secrets.SERVER_DEPLOY_DIR }}"
            echo "[CI] Start deploy using pre-built jar, dir=${D}"
            cd "${D}/app/backend"
            echo "[CI] Backend directory content:"
            ls -l

            docker build -t stock-backend:latest .
            echo "[CI] Docker build done"
            cd "${D}/app"
            [ -f ../.env ] || { echo "Missing ${D}/.env (GLOBAL_DB_PASSWORD)"; exit 1; }
            echo "[CI] .env found"
            docker compose --env-file ../.env -f docker-compose.yml up -d backend
            echo "[CI] Docker compose up done"
            docker image prune -f
            echo "[CI] Docker prune done, deploy finished"
