name: CI/CD

on:
  push:
    tags: ['v*', 'V*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            D="${{ secrets.SERVER_DEPLOY_DIR }}"
            T="${{ github.ref_name }}"
            R="${{ github.repository }}"
            rm -rf "${D}/app"
            git clone --depth 1 --branch "${T}" "https://github.com/${R}.git" "${D}/app"
            cd "${D}/app"
            git lfs pull
            mvn -B clean package -DskipTests
            cp backend/target/*.jar backend/
            docker build -t stock-backend:latest ./backend
            [ -f ../.env ] || { echo "Missing ${D}/.env (GLOBAL_DB_PASSWORD)"; exit 1; }
            docker compose --env-file ../.env -f docker-compose.yml up -d backend
            docker image prune -f
