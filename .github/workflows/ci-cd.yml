name: Simple CI

on:
  push:
    branches: ['main']

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: build-backend-jar
        run: |
          mvn -B clean package -DskipTests
          cp backend/target/stock-trading-backend-*.jar backend/app.jar
      - name: upload-files-to-server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          mkdir -p deploy-staging/backend
          cp backend/app.jar backend/Dockerfile deploy-staging/backend/
          cp docker-compose.yml deploy-staging/
          sshpass -e rsync -avz --progress \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p 22" \
            deploy-staging/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_DEPLOY_DIR }}/app/
      - name: deploy-on-server
        uses: appleboy/ssh-action@v1.0.0
        env:
          GLOBAL_DB_PASSWORD: ${{ secrets.GLOBAL_DB_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          envs: GLOBAL_DB_PASSWORD
          script: |
            set -ex
            D="${{ secrets.SERVER_DEPLOY_DIR }}/app"
            cd "${D}"
            docker build -t stock-backend:latest -f backend/Dockerfile backend
            docker compose -f docker-compose.yml up -d backend
            docker image prune -f
