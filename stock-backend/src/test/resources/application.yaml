# 股票数据采集配置
stock:
  data:
    aktools:
      base-url: https://api.aktools.com
      timeout: 30000
      retry:
        max-attempts: 3
        delay: 1000
    sync:
      stock-list:
        cron: "0 0 9 * * ?"
        enabled: false
      realtime-quote:
        cron: "0 0/1 9-15 * * ?"
        enabled: false
      historical:
        cron: "0 30 15 * * ?"
        enabled: false
